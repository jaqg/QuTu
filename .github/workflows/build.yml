name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y gfortran liblapack-dev libblas-dev

      - name: Build
        run: make

      - name: Run example
        run: |
          cp examples/01_basic_NH3/INPUT INPUT
          ./build/qutu
          ls OUTPUT
